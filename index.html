<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPTEC - Login</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">    <!-- CSS -->
    <link rel="stylesheet" href="../SIPTEC/style/style login.css">
    
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center">
        <div class="login-card text-center">
            
            <!-- CONTENEDOR DEL LOGO -->
            <div class="mb-3">
                <img src="../SIPTEC/img/SIPTEC Logo Circular.png" alt="Logo SIPTEC" class="img-fluid" style="max-height: 85px;">
            </div>

            <h4 class="login-title mb-1">BIENVENIDO A SIPTEC</h4>
            <p class="login-subtitle mb-3">Sistema de préstamo e inventario de área técnica</p>
            <p class="login-instruction mb-4">Ingresa tus credenciales para acceder al sistema</p>

            <form onsubmit="return false;">
                <div class="mb-3 text-start">
                    <label for="email" class="form-label">Correo electrónico:</label>
                    <input type="email" id="email" class="form-control" autocomplete="off">
                </div>
                
                <div class="mb-4 text-start">
                    <label for="password" class="form-label">Contraseña:</label>
                    <input type="password" id="password" class="form-control">
                </div>

                <button type="submit" class="btn-custom mb-4">Iniciar Sesión</button>
            </form>

            <div class="login-footer border-top pt-3 border-secondary border-opacity-25">
                Desarrollado por Equipo PTC de 2 año de bachillerato de software 2A
            </div>

        </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- Script de JS -->
    <script src="../SIPTEC/js/script.js"></script>
</body>
</html>
